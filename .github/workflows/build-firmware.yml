name: Build & Release Firmware

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for changelog

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh \
            | BINDIR=/usr/local/bin sh

      - name: Cache arduino-cli data
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino/libraries
          key: arduino-${{ runner.os }}-${{ hashFiles('**/build-firmware.yml') }}
          restore-keys: |
            arduino-${{ runner.os }}-

      - name: Configure arduino-cli
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Update board index
        run: arduino-cli core update-index

      - name: Install ESP32 core
        run: arduino-cli core install esp32:esp32

      - name: Install Arduino registry libraries
        run: |
          arduino-cli lib install "ArduinoJson@6.21.5"
          arduino-cli lib install "PubSubClient@2.8.0"

      - name: Install AsyncTCP (GitHub)
        run: |
          [ -d ~/Arduino/libraries/AsyncTCP ] || \
            git clone --depth 1 https://github.com/me-no-dev/AsyncTCP \
              ~/Arduino/libraries/AsyncTCP

      - name: Install ESPAsyncWebServer (GitHub)
        run: |
          [ -d ~/Arduino/libraries/ESPAsyncWebServer ] || \
            git clone --depth 1 https://github.com/me-no-dev/ESPAsyncWebServer \
              ~/Arduino/libraries/ESPAsyncWebServer

      - name: Extract firmware version
        id: version
        run: |
          VERSION=$(grep -oP '(?<=DEVICE_VERSION = ")[\d.]+(?=")' code/code.ino)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}-build${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Compile firmware
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --build-property "build.partitions=default" \
            --build-property "upload.maximum_size=1310720" \
            --output-dir build/ \
            code/

      - name: Rename firmware binary
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          mv build/code.ino.bin            "build/aquasensys-firmware-${TAG}.bin"
          mv build/code.ino.bootloader.bin "build/bootloader-${TAG}.bin"
          mv build/code.ino.partitions.bin "build/partitions-${TAG}.bin"
          echo "BIN_PATH=build/aquasensys-firmware-${TAG}.bin"  >> "$GITHUB_ENV"
          echo "BIN_NAME=aquasensys-firmware-${TAG}.bin"         >> "$GITHUB_ENV"
          echo "BOOT_PATH=build/bootloader-${TAG}.bin"           >> "$GITHUB_ENV"
          echo "PART_PATH=build/partitions-${TAG}.bin"           >> "$GITHUB_ENV"

      - name: Package SD assets
        run: |
          cd code/sd && zip -0 -r ../../build/sd-assets.zip . --exclude='config.json'

      - name: Generate release notes
        run: |
          git fetch --tags
          THIS_TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${THIS_TAG}$" | head -1)
          {
            echo "## AquaSensys ${{ steps.version.outputs.version }}"
            echo ""
            echo "Built from commit \`${{ github.sha }}\` on \`main\`."
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "### Changes since ${PREV_TAG}"
              git log --oneline "${PREV_TAG}..HEAD"
            else
              echo "### Recent changes"
              git log --oneline -10
            fi
            echo ""
            echo "### Assets"
            echo "| File | Description |"
            echo "|---|---|"
            echo "| \`aquasensys-firmware-*.bin\` | Firmware — upload via OTA page |"
            echo "| \`bootloader-*.bin\` | Bootloader (USB initial flash only) |"
            echo "| \`partitions-*.bin\` | Partition table (USB initial flash only) |"
            echo "| \`sd-assets.zip\` | Web UI files for SD card |"
            echo ""
            echo "### OTA Update"
            echo "Use the firmware update page on the device and upload \`aquasensys-firmware-*.bin\`."
            echo ""
            echo "### Initial / Recovery Flash via USB"
            echo '```bash'
            echo "esptool.py --chip esp32 --port /dev/ttyUSB0 --baud 460800 write_flash \\"
            echo "  0x1000  bootloader-${{ steps.version.outputs.tag }}.bin \\"
            echo "  0x8000  partitions-${{ steps.version.outputs.tag }}.bin \\"
            echo "  0x10000 aquasensys-firmware-${{ steps.version.outputs.tag }}.bin"
            echo '```'
            echo ""
            echo "### Board"
            echo "- FQBN: \`esp32:esp32:esp32\`"
            echo "- Partition scheme: \`default\` (OTA, 1.25 MB per app slot)"
          } > build/release_notes.md

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}
          path: ${{ env.BIN_PATH }}
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "AquaSensys ${{ steps.version.outputs.tag }}"
          body_path: build/release_notes.md
          files: |
            ${{ env.BIN_PATH }}
            ${{ env.BOOT_PATH }}
            ${{ env.PART_PATH }}
            build/sd-assets.zip
          fail_on_unmatched_files: true
